services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      FENGVOICE_DB_PATH: /app/data/fengvoice.db
    ports:
      - "8000:8000"
    volumes:
      - fengvoice_data:/app/data

  web:
    build:
      context: apps/web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  fengvoice_data:

