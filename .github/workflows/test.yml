name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install httpx

      - name: Python lint
        working-directory: services/api
        run: python -m py_compile main.py asset_index.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Node dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Verify image paste upload
        working-directory: .
        run: node scripts/verify-image-paste-upload.js

      - name: Verify image asset index validation CLI
        working-directory: .
        run: python scripts/verify-image-asset-index-validation.py

      - name: Verify image asset lookup CLI
        working-directory: .
        run: python scripts/verify-find-image-asset.py

      - name: Verify image asset index
        working-directory: .
        run: node scripts/verify-image-asset-index.js
